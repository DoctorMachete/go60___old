manifest:
  remotes:
#    - name: moergo-sc
#      url-base: https://github.com/moergo-sc
    - name: darknao
      url-base: https://github.com/darknao
    - name: urob
      url-base: https://github.com/urob
    - name: dhruvinsh
      url-base: https://github.com/dhruvinsh

      
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: ssbb
      url-base: https://github.com/ssbb
      

  projects:
  #  - name: zmk
  #    remote: moergo-sc
  #    revision: main
  #    import: app/west.yml
    - name: zmk
      remote: darknao
      revision: rgb-layer-24.12
      import: app/west.yml

    - name: zmk-unicode
      remote: urob
      revision: main

    - name: zmk-tri-state
      remote: dhruvinsh
      revision: main

    - name: zmk-adaptive-key
      remote: urob
      revision: v0.3 # Should match ZMK release, using v0.3 instead of main just in case it breaks later on

    - name: zmk-leader-key
      remote: urob
      revision: v0.3 # Should match ZMK release, using v0.3 instead of main just in case it breaks later on
      
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-listeners
      remote: ssbb
      revision: v1
  self:
    path: config
